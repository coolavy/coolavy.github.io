# Site Settings
title: "Avyan Gupta Portfolio"
description: "Electrical & Software Engineering Projects"
url: "https://coolavy.github.io"

# Theme Configuration
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "dark"

# Author Details
author:
  name: "Avyan Gupta"
  bio: "High School Student & Robotics Enthusiast"
  avatar: "https://github.com/coolavy.png" # Pulls your profile picture automatically
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/coolavy"

# Plugins
plugins:
  - jekyll-include-cache
  - jekyll-remote-theme

# Defaults for pages
# Defaults for pages
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true
      sidebar:
        nav: "docs"
